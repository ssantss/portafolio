name: CI

on: [push, pull_request]

jobs:
  check-astro:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: checks
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0
          cache: "npm"
      - run: npm install
      - run: npm run check
